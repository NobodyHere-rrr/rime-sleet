# Rime schema
# encoding: utf-8

# 方案说明
schema:
  schema_id: rime_sleet
  name: 凍雨拼音
  version: "rolling"
  author:
    - Dvel
    - MessTG2333
  description: |
    凍雨拼音
    https://github.com/NobodyHere-rrr/rime-sleet
  dependencies:
    - radical_pinyin # 拆字反査
    - cangjie5 # 倉頡反査
    - easy_en # English
    - eng_chi # 英漢反査
    - jaroomaji.kana # 仮名

# 开关
# reset: 默认状态。注释掉后，切换窗口时不会重置到默认状态。
# states: 方案选单显示的名称。可以注释掉，仍可以通过快捷键切换。
# abbrev: 默认的缩写取 states 的第一个字符，abbrev 可自定义一个字符
switches:
  - name: ascii_mode
    states: [漢, Ａ]
  - name: ascii_punct
    states: [¥, $]
    reset: 1
  - options: [s, s2t, s2t_2, s2tw, s2jp]
    states: [简, 繁, 䋣, 臺, 日]
    reset: 1
  - name: emoji
    states: [💀, 😄]
    reset: 1
  #  - name: kaomoji
  #    states: [(X_X), (・∀・)ノ]
  #    reset: 1
  - name: full_shape
    states: [半角, 全角]
  - name: search_single_char # search.lua 的功能开关，辅码查词时是否单字优先
    states: [正常, 单字]
    abbrev: [词, 单]

# 输入引擎
engine:
  processors:
    - lua_processor@*select_character # 以词定字
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@radical_lookup # 部件拆字自定义 tag
    - affix_segmentor@cangjie_lookup # 倉頡 tag
    - affix_segmentor@easy_en # 中英詞典 tag
    - affix_segmentor@jaroomaji.kana # 仮名 tag
    - affix_segmentor@add_user_dict # 自造詞 tag
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - lua_translator@*date_translator # 时间、日期、星期
    - lua_translator@*lunar # 农历
    - table_translator@custom_phrase # 自定义短语 custom_phrase.txt
    - table_translator@easy_en # 英文
    - table_translator@jaroomaji.kana # 仮名
    - table_translator@radical_lookup # 部件拆字反查
    - table_translator@cangjie_lookup # 倉頡反査
    - lua_translator@*unicode # Unicode
    - lua_translator@*number_translator # 数字、金额大写
    - lua_translator@*calc_translator # 计算器
    - lua_translator@*force_gc # 暴力 GC
    - script_translator@user_dict_set
    - script_translator@add_user_dict
  filters:
    - lua_filter@*corrector # 错音错字提示
    - reverse_lookup_filter@pinyin_reverse_lookup # 拼音反査滤镜
    - reverse_lookup_filter@eng_chi_reverse_lookup # 英漢反査滤镜
    - lua_filter@*pin_cand_filter # 置顶候选项（顺序要求：置顶候选项 > Emoji > 简繁切换）
    - lua_filter@*long_word_filter # 长词优先（顺序要求：长词优先 > Emoji）
    - simplifier@emoji # 絵文字
    # - simplifier@kaomoji                         # 顏文字
    - simplifier@s2t # 繁
    - simplifier@s2t_2 # 䋣
    - simplifier@s2tw # 臺
    - simplifier@s2jp # 日
    - lua_filter@*search@radical_pinyin # 部件拆字辅码
    - uniquifier # 去重

# Lua 配置: 日期、时间、星期、ISO 8601、时间戳的触发关键字
date_translator:
  date: date # 日期： 2022-11-29
  time: time # 时间： 18:13
  week: week # 星期： 星期二
  datetime: datetime # ISO 8601： 2022-11-29T18:13:11+08:00
  timestamp: timestamp # 时间戳： 1669716794

# Lua 配置：农历的触发关键字
lunar: lunar # 农历： 二〇二三年冬月二十 癸卯年（兔）冬月二十

# Lua 配置：长词优先
# 提升 count 个词语，插入到第 idx 个位置。
# 示例：将 2 个词插入到第 4、5 个候选项，输入 jie 得到「1接 2解 3姐 4饥饿 5极恶 6结 7界……」
long_word_filter:
  count: 2
  idx: 4


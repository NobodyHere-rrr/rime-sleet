# 語灋模型
grammar:
language: zh-hans-t-huayu-v7-bgw
#  language: wanxiang-lts-zh-hans
#  collocation_max_length: 8 #命中的最长词组
#  collocation_min_length: 3 #命中的最短词组，搭配词频健全的词库时候应当最小值设为3避开2字高频词
#  collocation_penalty: -10 #默认-12 对常见搭配词组施加的惩罚值。较高的负值会降低这些搭配被选中的概率，防止过于频繁地出现某些固定搭配。
#  non_collocation_penalty: -20 #默认-12 对非搭配词组施加的惩罚值。较高的负值会降低非搭配词组被选中的概率，避免不合逻辑或不常见的词组组合。
#  weak_collocation_penalty: -35 #默认-24 对弱搭配词组施加的惩罚值。保持默认值通常是为了有效过滤掉不太常见但仍然合理的词组组合。
#  rear_penalty: -12 #默认-18 对词组中后续词语的位置施加的惩罚值。较高的负值会降低某些词语在句子后部出现的概率，防止句子结构不自然。

# 主翻译器，拼音
translator:
  dictionary: rime_sleet
  contextual_suggestions: false
  max_homophones: 7
  max_homographs: 7
  enable_user_dict: false # 是否开启自动调频
  enable_word_completion: true # 大于 4 音节的词条自动补全，librime > 1.11.2
  spelling_hints: 8 # corrector.lua ：为了让错音错字提示的 Lua 同时适配全拼双拼，将拼音显示在 comment 中
  always_show_comments: true # corrector.lua ：Rime 默认在 preedit 等于 comment 时取消显示 comment，这里强制一直显示，供 corrector.lua 做判断用。
  initial_quality: 1.2
  comment_format: # 标记拼音注释，供 corrector.lua 做判断用
    - xform/^/［/
    - xform/$/］/
  preedit_format: # preedit_format 影响到输入框的显示和“Shift+回车”上屏的字符
    - xform/([jqxy])v/$1u/ # 显示为 ju qu xu yu
    - xform/([nl])v/$1ü/ # 显示为 nü lü
    - xform/([nl])ue/$1üe/ # 显示为 nüe lüe
    # - xform/([nl])v/$1v/ # 显示为 nv lv
    # - xform/([nl])ue/$1ve/ # 显示为 nve lve
    - xform/(?<=[A-Z])\s(?=[A-Z])// # 消除大写字母之间的空格

# 自定义短语：custom_phrase.txt
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase # 可以修改这里，改成自己的 txt 文件
  db_class: stabledb # 只读数据库，无法动态调频；设为 tabledb 可以动态调频
  enable_completion: false # 补全提示
  enable_sentence: false # 禁止造句
  initial_quality: 99

# 絵文字
emoji:
  option_name: emoji # 对应 switches 中的 name
  opencc_config: emoji.json # 选择要加载的 OpenCC 配置
  inherit_comment: false # 在 corrector.lua 及反查中，emoji 的 comment 显示为空
  tags: [abc] # 限制在对应 tag
# 顏文字
# kaomoji:
#   option_name: kaomoji # 对应 switches 中的 name
#   opencc_config: kaomoji.json # 选择要加载的 OpenCC 配置
#   inherit_comment: false
#   tags: [abc] # 限制在对应 tag

# 简繁切换
s2t:
  option_name: s2t # 对应 switches 中的 name
  opencc_config: S2SMTGTCL.json # s2t.json | s2hk.json | s2tw.json | s2twp.json （Rime 内置配置，在程序目录可找到）
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [abc, number, gregorian_to_lunar, add_user_dict] # 限制在对应 tag，不对其他如反查的内容做简繁转换
s2t_2:
  option_name: s2t_2 # 对应 switches 中的 name
  opencc_config: S2SMTGTC.json # s2t.json | s2hk.json | s2tw.json | s2twp.json （Rime 内置配置，在程序目录可找到）
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [abc, number, gregorian_to_lunar, add_user_dict] # 限制在对应 tag，不对其他如反查的内容做简繁转换
s2tw:
  option_name: s2tw # 对应 switches 中的 name
  opencc_config: s2tw.json # s2t.json | s2hk.json | s2tw.json | s2twp.json （Rime 内置配置，在程序目录可找到）
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [abc, number, gregorian_to_lunar, add_user_dict] # 限制在对应 tag，不对其他如反查的内容做简繁转换
s2jp:
  option_name: s2jp # 对应 switches 中的 name
  opencc_config: s2jp.json # s2t.json | s2hk.json | s2tw.json | s2twp.json （Rime 内置配置，在程序目录可找到）
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  tags: [abc, number, gregorian_to_lunar, add_user_dict] # 限制在对应 tag，不对其他如反查的内容做简繁转换

# 标点符号
# punctuator 下面有三个子项：
#   full_shape 全角标点映射
#   half_shape 半角标点映射
#   symbols    Rime 的预设配置是以 '/' 前缀开头输出一系列字符，自定义的 symbols_v.yaml 修改成了 'v' 开头。
punctuator:
  full_shape:
    __include: default:/punctuator/full_shape # 从 default.yaml 导入配置
  half_shape:
    __include: default:/punctuator/half_shape # 从 default.yaml 导入配置
  symbols:
    __include: symbols_v:/symbols # 从 symbols_v.yaml 导入配置

# 部件拆字反查
radical_lookup:
  tag: radical_lookup
  dictionary: radical_pinyin
  enable_user_dict: false
  prefix: "u"
  suffix: "'"
  tips: "《拆字》▶"
  closing_tips: "◀《拆字》"
  preedit_format:
    - xform/^/《拆字》▶ /
    - 'xform/\\/ /'
  comment_format:
    - erase/^.*$//
# 倉頡反査
cangjie_lookup:
  tag: cangjie_lookup
  dictionary: cangjie5
  # enable_charset_filter: false
  enable_completion: false
  enable_user_dict: false
  enable_sentence: false
  prefix: "U"
  suffix: "'"
  tips: "《倉頡》▶"
  closing_tips: "◀《倉頡》"
  preedit_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|"
    - xform/^/《倉頡》▶ /
    - 'xform/\\/ /'
# 反査拼音濾鏡
pinyin_reverse_lookup:
  tags: [radical_lookup, cangjie_lookup]
  dictionary: rime_sleet
  comment_format: # 自定义 comment，例如在左右加上括号
    - xform/^/(/
    - xform/$/)/

# 其它語言
# 英語
easy_en:
  tag: easy_en
  dictionary: easy_en_lower #easy_en_super
  enable_sentence: false
  enable_completion: true
  # sentence_over_completion: false
  enable_user_dict: false
  # strict_spelling: false
  # spelling_hints: 2
  # initial_quality: 1000
  prefix: "i"
  tips: "《Eng》▶"
  closing_tips: "◀《Eng》"
  preedit_format:
    - xform/^/《Eng》▶ /
    # - xform/》;/》; /
    # - xform|》[/]|》/ |
    # - xform|》'|》' |
    - 'xform/\\/ /'
  comment_format:
    - xform/.+// #刪除尚未輸入完整碼之提示 ~abc
  #   # - xform|[~a-z;/.'-]+||
  #   - xform/@@/\n          /
  #   - xform/@/ /
# 仮名
jaroomaji.kana:
  tag: jaroomaji.kana
  dictionary: jaroomaji.kana
  enable_sentence: true
  enable_completion: false
  enable_user_dict: false
  prefix: "I"
  tips: "《仮名》▶"
  closing_tips: "◀《仮名》"
  preedit_format:
    - xform/^/《仮名》▶ /
    # - xform/》;/》; /
    # - xform|》[/]|》/ |
    # - xform|》'|》' |
    - 'xform/\\/ /'
  comment_format:
    - xform/.+// #刪除尚未輸入完整碼之提示 ~abc
  #   # - xform|[~a-z;/.'-]+||
  #   - xform/@@/\n          /
  #   - xform/@/ /

eng_chi_reverse_lookup:
  tags: [easy_en]
  overwrite_comment: true
  dictionary: eng_chi
  comment_format:
    - xform/@@/\n          /
    - xform/@/ /
# 防崩潰 (不過對于hamster來說還是太長了)
#    # - xform/^(﹝.+﹞)?\[[^@]+\]/$1/
#    - xform/^(﹙.+﹚)?\[[^[]+\]/$1/
#    - xform/([a-zA-Z0-9])@([a-zA-Z0-9])/$1 $2/
#    - xform/@@/ /
#    - xform/@//
# - xform/^([^﹝])/ $1/
#    - xform/^([^﹙])/ $1/
#    - xform/^((?:[\0-\x7F\xC2-\xFD][\x80-\xBF]*){30})(?:[\0-\x7F\xC2-\xFD][\x80-\xBF]*)+$/$1 ……《略》/

user_dict_set:
  dictionary: rime_sleet
  initial_quality: 0
  enable_completion: true
  enable_sentence: false
  ##  默认为不超过 2 个字的候选项显示输入码；将 2 改为 0 可关闭编码提示，
  ##  改为 1 则是只显示单字的输入码，依此类推。
  spelling_hints: 1
  enable_user_dict: true # 是否开启自动调频
  user_dict: user.custom.dict
  db_class: tabledb

# 自定义词典加词
add_user_dict:
  tag: add_user_dict
  dictionary: rime_sleet
  initial_quality: -1
  user_dict: user.custom.dict
  # ↓ 用户词典格式，tabledb（文本） 或 userdb （二进制）。
  db_class: tabledb
  enable_completion: true
  enable_encoder: true # 是否开启自动造词〔仅 table_translator 有效〕
  enable_sentence: true #  是否开启自动造句
  enable_user_dict: true # 是否开启用户词典
  encode_commit_history: false # 是否对已上屛词自动成词〔仅 table_translator 有效〕
  prefix: "u+"
  tips: "《自造》▶"
  preedit_format:
    - xform/^/《自造》▶ /
    - 'xform/\\/ /'

# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default # 从 default.yaml 继承通用的
  patterns: # 再增加方案专有的：
    punct: "^v([0-9]|10|[A-Za-z]+)$" # 响应 symbols_v.yaml 的 symbols，用 'v' 替换 '/'
    radical_lookup: "^u[a-z]+$" # 响应部件拆字的反查，触发前缀与 radical_lookup/prefix 匹配
    cangjie_lookup: "^U[a-z]+$" # 响应倉頡的反查，触发前缀与 cangjie_lookup/prefix 匹配
    unicode: "^U\\+[0-9a-f]+" # 腳本現在衹會匹配 "U+" 開頭的字符串
    number: "^R[0-9]+[.]?[0-9]*" # 脚本将自动获取第 2 个字符 R 作为触发前缀，响应 lua_translator@*number_translator，数字金额大写
    calculator: "^cC.+" # 响应 lua_translator@*calc_translator，计算器。前缀设定项 calculator/prefix
    gregorian_to_lunar: "^N[0-9]{1,8}" # 脚本将自动获取第 2 个字符 N 作为触发前缀，响应 lua_translator@*lunar，公历转农历，输入 N20240115 得到「二〇二三年腊月初五」
    easy_en: "^i[a-z,./;'-]*$"
    jaroomaji.kana: "^I[a-zA-Z,./;'-]*$"
    add_user_dict: "^u\\+[A-Za-z]*$" # 造詞

# 从 default 继承快捷键
key_binder:
  import_preset: default # 从 default.yaml 继承通用的
  search: "`" # 辅码引导符，要添加到 speller/alphabet
  # bindings:             # 也可以再增加方案专有的快捷键

editor:
  bindings:
    space: confirm # 空格键：上屏候选项
    Return: commit_raw_input # 回车键：上屏原始输入
    Control+Return: commit_script_text # Ctrl+回车键：上屏变换后输入（经过 preedit_format 转换的）
    Control+Shift+Return: commit_comment # Ctrl+Shift+回车键：上屏 comment
    BackSpace: revert # 退格键：向前删除（撤消上次输入）
    Delete: delete # Delete 键：向后删除
    Control+BackSpace: back_syllable # Ctrl+退格键：删除一个音节
    Control+Delete: delete_candidate # Ctrl+Delete键：删除或降权候选项
    Escape: cancel # Esc 键：取消输入

# 拼写设定
speller:
  # 如果不想让什么标点直接上屏，可以加在 alphabet，或者编辑标点符号为两个及以上的映射
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA`+
  # initials 定义仅作为始码的按键，排除 ` 让单个的 ` 可以直接上屏
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '" # 第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  algebra:
    - xlit/āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜü/aaaaooooeeeeiiiiuuuuvvvvv/
    - xform/ń|ň|ǹ/en/
    - xform/ńg|ňg|ǹg/eng/
    ### 模糊音
    # 声母
    # - derive/^([zcs])h/$1/          # zh* ch* sh* 派生出 z* c* s*
    # - derive/^([zcs])([^h])/$1h$2/  # z* c* s*    派生出 zh* ch* sh*
    # - derive/^l/n/  # 解释：为 l 开头的拼写派生出 n 开头，即 nai 也可以输出 lai（来、莱、赖……）
    # - derive/^n/l/  #      lai 可输出 nai（奶、乃、奈……）。 可以单向或成对儿启用模糊音
    # - derive/^f/h/
    # - derive/^h/f/
    # - derive/^l/r/
    # - derive/^r/l/
    # - derive/^g/k/
    # - derive/^k/g/
    # 韵母
    # - derive/ang$/an/
    # - derive/an$/ang/
    # - derive/eng$/en/
    # - derive/en$/eng/
    # - derive/in$/ing/
    # - derive/ing$/in/
    # - derive/ian$/iang/
    # - derive/iang$/ian/
    # - derive/uan$/uang/
    # - derive/uang$/uan/
    # - derive/ai$/an/
    # - derive/an$/ai/
    # - derive/ong$/un/
    # - derive/un$/ong/
    # - derive/ong$/on/
    # - derive/iong$/un/
    # - derive/un$/iong/
    # - derive/ong$/eng/
    # - derive/eng$/ong/
    # 拼音音节
    # - derive/^fei$/hui/
    # - derive/^hui$/fei/
    # - derive/^hu$/fu/
    # - derive/^fu$/hu/
    # - derive/^wang$/huang/
    # - derive/^huang$/wang/

    ### 旧时的拼写规则
    # - derive/un$/uen/
    # - derive/ui$/uei/
    # - derive/iu$/iou/

    ### 超级简拼
    - erase/^hm$/ # 响应超级简拼，取消「噷 hm」的独占（如果拼音词库有这个音节的话，雾凇里没有）
    - erase/^m$/ # 响应超级简拼，取消「呣 m」的独占（如果拼音词库有这个音节的话，雾凇里没有）
    - erase/^n$/ # 响应超级简拼，取消「嗯 n」的独占（如果拼音词库有这个音节的话，雾凇里没有）
    - erase/^ng$/ # 响应超级简拼，取消「嗯 ng」的独占（如果拼音词库有这个音节的话，雾凇里没有）
    - abbrev/^([a-z]).+$/$1/ # 超级简拼
    - abbrev/^([zcs]h).+$/$1/ # 超级简拼中，zh ch sh 视为整体（ch'sh → 城市），而不是像这样分开（c'h's'h → 吃好睡好）。

    ### v u 转换
    # 雾凇的词库严格按照正确的 u v(ü) 注音的，下面两行支持使用错误的拼音，例如 qv nue 来响应 qu nve
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    # 以防引入的其他词库没按照正确方式注音，也做一个转换
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/

    ### 自动纠错
    ########## START 这几个有副作用的规则圈起来，方便取舍
    # 这些规则对全拼简拼混输有副作用：如「x'ai 喜爱」被纠错为「xia 下」
    # zh、ch、sh
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/ # hzi → zhi
    - derive/([zcs])h([aeiu])$/$1$2h/ # zih → zhi
    # # ia
    # - derive/([qjx])ia$/$1ai/  # qai → qia
    # # an
    # - derive/([wrtypsdfghklzcbnm])an$/$1na/  # dna → dan
    # # en
    # - derive/([wrpsdfghklzcbnm])en$/$1ne/  # rne → ren
    # # in
    # - derive/([qypjlxbnm])in$/$1ni/  # qni → qin
    # # un
    # - derive/([qrtysdghjklzxc])un$/$1nu/  # qnu → qun
    # # ian
    # - derive/([qtpdjlxbnm])ian$/$1ain/
########## END
